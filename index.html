<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="gate.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veera Palo — Words to Enchant</title>
  <meta name="description" content="Poems by Veera Palo. Words to enchant. God’s masks to try on.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home">
  <div class="forest" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="leaves"></div>
    <div class="water"></div>
    <div class="sparkles" id="sparkles"></div>
  </div>

  <main>
    <a class="profile-bubble" href="about.html" aria-label="Veera Palo — about and contact">
      <img src="assets/portrait.svg" alt="Veera Palo">

    <h1 class="headline">Words to enchant.<br>God’s masks to try on.</h1>

    <p class="visually-hidden">Tap the poem, or press the arrow keys, to read the next poem.</p>

    <div class="poem-area">
      <article class="poem-card" id="poem-card" aria-live="polite"></article>
      <div class="poem-hint poem-hint-prev" aria-hidden="true">
        <span class="poem-arrow"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M14.5 5.5 8 12l6.5 6.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>
      <div class="poem-hint poem-hint-next" aria-hidden="true">
        <span class="poem-arrow"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M9.5 5.5 16 12l-6.5 6.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>
    </div>
    <noscript><p class="noscript-note">This little forest needs JavaScript to bloom.</p></noscript>
  </main>

  <footer>All poems © Veera Palo</footer>

  <script src="poems.js"></script>
  <script src="app.js"></script>

</html>
